<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamKit - Виджеты для TikTok Live</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        background: '#0e1621',
                        foreground: '#e8edf2',
                        card: '#17212b',
                        primary: '#3da9de',
                        secondary: '#1e2c3a',
                        muted: '#1e2c3a',
                        border: 'rgba(255, 255, 255, 0.07)',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0e1621; color: #e8edf2; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .checker-bg {
            background-image: linear-gradient(45deg,#1e2c3a 25%,transparent 25%), linear-gradient(-45deg,#1e2c3a 25%,transparent 25%), linear-gradient(45deg,transparent 75%,#1e2c3a 75%), linear-gradient(-45deg,transparent 75%,#1e2c3a 75%);
            background-size: 14px 14px;
            background-position: 0 0,0 7px,7px -7px,-7px 0px;
            background-color: #141f2a;
        }
        /* Loader */
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top-color: #3da9de; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="overflow-hidden flex h-screen w-full">

    <!-- Левое меню (Desktop) -->
    <nav class="hidden md:flex flex-col w-64 border-r border-border bg-card/50 p-4 h-full" id="sidebar"></nav>

    <!-- Основной контент -->
    <main class="flex-1 overflow-y-auto relative pb-24 md:pb-8 flex flex-col" id="main-content">
        <!-- Сюда будет рендериться контент -->
        <div class="flex h-full items-center justify-center"><div class="loader"></div></div>
    </main>

    <!-- Нижнее меню (Mobile) -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 border-t border-border flex items-center justify-around px-2 pt-2 pb-5 bg-[#0e1621]/90 backdrop-blur-xl z-30" id="bottom-bar"></nav>

    <!-- Модальное окно виджета -->
    <div id="modal-container"></div>

    <script>
        // ── Supabase REST API ────────────────────────────────────────────────
        const SUPABASE_URL = 'https://lqjagftaeejdufwwvjwd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_6-9IBhMX9CMVbIackZAJ9g_UUk5FDqx';

        async function supabaseFetch(endpoint, options = {}) {
            const token = localStorage.getItem('sb_access_token') || SUPABASE_KEY;
            const headers = {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json',
                ...options.headers
            };
            const response = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, { ...options, headers });
            if (!response.ok) {
                if (response.status === 401) handleLogout();
                throw new Error(`Ошибка: ${response.statusText}`);
            }
            if (response.status === 204) return null;
            return response.json();
        }

        async function supabaseAuth(endpoint, body) {
            const response = await fetch(`${SUPABASE_URL}/auth/v1/${endpoint}`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error_description || data.msg || 'Ошибка авторизации');
            return data;
        }

        // ── STATE ────────────────────────────────────────────────────────────
        const CATEGORIES = ["Все", "Алерты", "Чат", "Донаты", "Цели", "Таймер", "Игры", "Музыка", "Статистика", "Эффекты", "Опросы", "Погода"];
        const GRADIENTS = ["linear-gradient(135deg,#f97316,#ef4444)", "linear-gradient(135deg,#3b82f6,#06b6d4)", "linear-gradient(135deg,#ec4899,#8b5cf6)", "linear-gradient(135deg,#10b981,#059669)", "linear-gradient(135deg,#8b5cf6,#6d28d9)", "linear-gradient(135deg,#eab308,#f97316)"];
        const ICONS_MAP = { "Алерты": "zap", "Чат": "message-circle", "Донаты": "gift", "Цели": "target", "Таймер": "clock", "Игры": "gamepad-2", "Музыка": "music-2", "Статистика": "bar-chart-2", "Эффекты": "sparkles", "Опросы": "bar-chart", "Погода": "cloud", "Все": "layout-grid" };

        let state = {
            activeNav: 'home', 
            userId: localStorage.getItem('sb_user_id'),
            tiktokUsername: localStorage.getItem('tiktok_username') || '',
            widgets: [],
            installedIds: new Set(),
            searchQuery: '',
            activeCategory: 'Все',
            selectedWidget: null,
            copiedId: null,
            isLoginMode: true,
            authError: '',
            isUploading: false
        };

        const fmtInstalls = (n) => n >= 1000 ? `${(n / 1000).toFixed(1)}k` : n;

        // ── INIT & FETCH ─────────────────────────────────────────────────────
        async function initApp() {
            try {
                const widgetsData = await supabaseFetch('stream_widgets?select=id,name,category,icon_name,gradient,author,description,installs,rating,reviews,tags,is_new&order=created_at.desc');
                if (widgetsData) state.widgets = widgetsData;

                if (state.userId) {
                    const installsData = await supabaseFetch(`stream_user_installs?select=widget_id&user_id=eq.${state.userId}`);
                    if (installsData) state.installedIds = new Set(installsData.map(i => i.widget_id));
                }
            } catch (err) {
                console.error("Ошибка инициализации:", err);
            }
            renderAll();
        }

        // ── RENDER ENGINE ────────────────────────────────────────────────────
        function renderAll() {
            renderSidebar();
            renderBottomBar();
            renderMain();
            renderModal();
            lucide.createIcons();
        }

        function renderSidebar() {
            const sb = document.getElementById('sidebar');
            const navs = [
                { id: "home", icon: "home", label: "Каталог виджетов" },
                ...(state.userId ? [
                    { id: "installed", icon: "bookmark", label: "Мои виджеты", badge: state.installedIds.size },
                    { id: "upload", icon: "code", label: "Создать виджет" },
                    { id: "profile", icon: "user-circle-2", label: "Настройки профиля" }
                ] : [])
            ];

            sb.innerHTML = `
                <div class="flex items-center gap-3 mb-10 px-2 mt-2">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-gradient-to-br from-[#69c9d0] to-[#ee1d52] shadow-lg">
                        <i data-lucide="play" class="text-white w-5 h-5"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold leading-tight">StreamKit</h1>
                        <p class="text-xs text-slate-400 leading-tight">TikTok Live Tools</p>
                    </div>
                </div>
                <div class="flex flex-col gap-2 flex-1">
                    ${navs.map(n => `
                        <button data-nav="${n.id}" class="flex items-center justify-between px-4 py-3 rounded-xl transition-all ${state.activeNav === n.id ? 'bg-[#3da9de]/10 text-[#3da9de] font-semibold' : 'text-slate-400 hover:bg-[#1e2c3a]'}">
                            <div class="flex items-center gap-3">
                                <i data-lucide="${n.icon}" class="w-[18px] h-[18px]"></i>
                                <span class="text-sm">${n.label}</span>
                            </div>
                            ${n.badge ? `<span class="bg-[#3da9de]/20 text-[#3da9de] text-[10px] px-2 py-0.5 rounded-full font-bold">${n.badge}</span>` : ''}
                        </button>
                    `).join('')}
                    
                    <div class="mt-auto pt-4 border-t border-border">
                        ${state.userId 
                            ? `<button data-action="logout" class="flex items-center gap-3 px-4 py-3 w-full rounded-xl text-red-400 hover:bg-red-400/10 transition-colors">
                                <i data-lucide="log-out" class="w-[18px] h-[18px]"></i>
                                <span class="text-sm font-medium">Выйти</span>
                               </button>`
                            : `<button data-nav="auth" class="flex items-center justify-center gap-2 px-4 py-3 w-full rounded-xl bg-[#3da9de] text-white font-semibold hover:opacity-90 transition-opacity">
                                <i data-lucide="log-in" class="w-[18px] h-[18px]"></i>
                                <span class="text-sm">Войти в аккаунт</span>
                               </button>`
                        }
                    </div>
                </div>
            `;
        }

        function renderBottomBar() {
            const bb = document.getElementById('bottom-bar');
            const navs = [
                { id: "home", icon: "home", label: "Каталог" },
                ...(state.userId ? [
                    { id: "installed", icon: "bookmark", label: "Мои" },
                    { id: "upload", icon: "code", label: "Создать" },
                    { id: "profile", icon: "user-circle-2", label: "Профиль" }
                ] : [
                    { id: "auth", icon: "log-in", label: "Войти" }
                ])
            ];

            bb.innerHTML = navs.map(n => `
                <button data-nav="${n.id}" class="flex flex-col items-center gap-1 px-4 py-1 rounded-xl transition-colors ${state.activeNav === n.id ? 'text-[#3da9de]' : 'text-slate-400'}">
                    <div class="p-1.5 rounded-xl transition-all ${state.activeNav === n.id ? 'bg-[#3da9de]/15' : ''}">
                        <i data-lucide="${n.icon}" class="w-5 h-5" stroke-width="${state.activeNav === n.id ? '2.2' : '1.8'}"></i>
                    </div>
                    <span class="text-[10px] font-medium ${state.activeNav === n.id ? 'text-[#3da9de]' : ''}">${n.label}</span>
                </button>
            `).join('');
        }

        function renderMain() {
            const main = document.getElementById('main-content');
            let content = '';

            const mobileHeader = `
                <header class="md:hidden flex items-center justify-between px-5 py-4 border-b border-border/50 sticky top-0 bg-[#0e1621]/90 backdrop-blur z-20">
                    <div class="flex items-center gap-2.5">
                        <div class="w-8 h-8 rounded-lg flex items-center justify-center bg-gradient-to-br from-[#69c9d0] to-[#ee1d52]">
                            <i data-lucide="play" class="text-white w-3.5 h-3.5"></i>
                        </div>
                        <h1 class="text-sm font-bold text-white">StreamKit</h1>
                    </div>
                </header>
            `;

            if (state.activeNav === 'auth') {
                content = `
                    <div class="max-w-md mx-auto py-12 px-4 w-full">
                        <div class="text-center mb-8">
                            <div class="w-16 h-16 rounded-2xl flex items-center justify-center bg-gradient-to-br from-[#69c9d0] to-[#ee1d52] shadow-xl mx-auto mb-5">
                                <i data-lucide="play" class="text-white w-8 h-8"></i>
                            </div>
                            <h2 class="text-2xl font-bold">${state.isLoginMode ? "С возвращением!" : "Создать аккаунт"}</h2>
                            <p class="text-sm text-slate-400 mt-2">Для сохранения виджетов требуется авторизация.</p>
                        </div>
                        <form id="auth-form" class="bg-card border border-border rounded-3xl p-6 md:p-8 shadow-sm">
                            ${state.authError ? `<div class="bg-red-500/10 border border-red-500/20 text-red-500 text-sm px-4 py-3 rounded-xl mb-5">${state.authError}</div>` : ''}
                            <div class="space-y-4 mb-6">
                                <div>
                                    <label class="block text-sm font-medium mb-1.5">Email</label>
                                    <input required type="email" id="auth-email" class="w-full bg-[#0e1621] border border-border rounded-xl px-4 py-3 text-sm focus:border-[#3da9de] outline-none text-white" placeholder="streamer@example.com" />
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1.5">Пароль</label>
                                    <input required type="password" id="auth-password" class="w-full bg-[#0e1621] border border-border rounded-xl px-4 py-3 text-sm focus:border-[#3da9de] outline-none text-white" placeholder="••••••••" />
                                </div>
                            </div>
                            <button type="submit" class="w-full py-3.5 rounded-xl bg-[#3da9de] text-white font-semibold text-sm hover:opacity-90 transition-opacity">
                                ${state.isLoginMode ? "Войти в систему" : "Зарегистрироваться"}
                            </button>
                            <div class="mt-6 text-center">
                                <button type="button" data-action="toggle-auth" class="text-sm text-slate-400 hover:text-[#3da9de] transition-colors">
                                    ${state.isLoginMode ? "Нет аккаунта? Создать новый" : "Уже есть аккаунт? Войти"}
                                </button>
                            </div>
                        </form>
                    </div>
                `;
            } else if (state.activeNav === 'home' || state.activeNav === 'installed') {
                let list = state.activeNav === "installed" ? state.widgets.filter(w => state.installedIds.has(w.id)) : state.widgets;
                if (state.activeNav === "home") {
                    if (state.activeCategory !== "Все") list = list.filter(w => w.category === state.activeCategory);
                    if (state.searchQuery) list = list.filter(w => w.name.toLowerCase().includes(state.searchQuery.toLowerCase()) || w.category.toLowerCase().includes(state.searchQuery.toLowerCase()));
                }

                content = `
                    <div class="max-w-6xl w-full mx-auto p-4 md:p-8">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                            <div>
                                <h2 class="text-2xl font-bold tracking-tight">${state.activeNav === "home" ? "Каталог виджетов" : "Моя библиотека"}</h2>
                                <p class="text-sm text-slate-400 mt-1">${state.activeNav === "home" ? "Оверлеи для TikTok Live, работающие напрямую с нашим API" : "Виджеты, добавленные в ваш аккаунт"}</p>
                            </div>
                            ${state.activeNav === "home" ? `
                            <div class="relative w-full md:w-72">
                                <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                                <input id="search-input" value="${state.searchQuery}" placeholder="Поиск..." class="w-full bg-card border border-border rounded-xl pl-10 pr-4 py-2 text-sm focus:border-[#3da9de] outline-none text-white" />
                            </div>` : ''}
                        </div>

                        ${state.activeNav === "home" ? `
                        <div class="flex gap-2 pb-6 overflow-x-auto scrollbar-hide">
                            ${CATEGORIES.map(cat => `
                                <button data-category="${cat}" class="shrink-0 flex items-center gap-1.5 px-4 py-2 rounded-xl text-xs font-medium transition-all ${state.activeCategory === cat ? 'bg-[#3da9de] text-white shadow-md' : 'bg-card border border-border text-slate-400 hover:bg-[#1e2c3a]'}">
                                    ${cat !== "Все" ? `<i data-lucide="${ICONS_MAP[cat] || 'layout-grid'}" class="w-3.5 h-3.5"></i>` : ''}
                                    ${cat}
                                </button>
                            `).join('')}
                        </div>` : ''}

                        ${list.length === 0 ? `
                        <div class="flex flex-col items-center justify-center py-20 text-center bg-card rounded-3xl border border-border">
                            <i data-lucide="layout-grid" class="text-slate-500 opacity-30 mb-4 w-12 h-12"></i>
                            <p class="text-base font-semibold">Ничего не найдено</p>
                        </div>` : `
                        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-5">
                            ${list.map(widget => {
                                const isInstalled = state.installedIds.has(widget.id);
                                const iconName = widget.icon_name ? widget.icon_name.toLowerCase() : 'code';
                                return `
                                <div data-widget="${widget.id}" class="bg-card rounded-2xl overflow-hidden border border-border cursor-pointer group flex flex-col hover:-translate-y-1 transition-transform">
                                    <div class="relative h-28 md:h-36 w-full flex-shrink-0 checker-bg">
                                        <div class="absolute inset-0 opacity-20" style="background: ${widget.gradient}"></div>
                                        <div class="absolute inset-0 flex items-center justify-center">
                                            <div class="w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg transform group-hover:scale-110 transition-transform" style="background: ${widget.gradient}">
                                                <i data-lucide="${iconName}" class="text-white w-6 h-6"></i>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="p-3 md:p-4 flex flex-col flex-1">
                                        <h3 class="text-xs md:text-sm font-semibold leading-tight line-clamp-2 mb-1 md:mb-2">${widget.name}</h3>
                                        <div class="flex items-center gap-1 mb-auto">
                                            <span class="text-[10px] md:text-xs text-slate-400">${widget.author}</span>
                                        </div>
                                        <div class="flex items-center justify-between mt-3">
                                            <div class="flex items-center gap-1 text-slate-400">
                                                <i data-lucide="download" class="w-3 h-3"></i>
                                                <span class="text-[10px] md:text-xs">${fmtInstalls(widget.installs)}</span>
                                            </div>
                                            <button data-install="${widget.id}" class="text-[10px] md:text-xs font-semibold px-2.5 md:px-3 py-1.5 rounded-lg transition-all ${isInstalled ? 'bg-emerald-500/20 text-emerald-400' : 'bg-[#3da9de]/20 text-[#3da9de] hover:bg-[#3da9de] hover:text-white'}">
                                                ${isInstalled ? 'Добавлен' : 'Добавить'}
                                            </button>
                                        </div>
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>`}
                    </div>
                `;
            } else if (state.activeNav === 'upload') {
                content = `
                    <div class="max-w-4xl mx-auto py-4 px-4 w-full">
                        <div class="mb-8 text-center">
                            <div class="w-16 h-16 rounded-full bg-[#3da9de]/10 flex items-center justify-center mx-auto mb-4">
                                <i data-lucide="code-2" class="text-[#3da9de] w-7 h-7"></i>
                            </div>
                            <h2 class="text-2xl font-bold">Разработчикам: Создать виджет</h2>
                            <p class="text-sm text-slate-400 mt-2">Опубликуйте ваш HTML код. Наш сервер бесплатно захостит его и предоставит WebSockets API для TikTok Live.</p>
                        </div>

                        <!-- ФОРМА ЗАГРУЗКИ -->
                        <form id="upload-form" class="bg-card border border-border rounded-3xl p-6 md:p-8 space-y-5 shadow-lg">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                                <div>
                                    <label class="block text-sm font-medium mb-1.5">Название виджета</label>
                                    <input required id="up-name" class="w-full bg-[#0e1621] border border-border rounded-xl px-4 py-3 text-sm focus:border-[#3da9de] outline-none text-white" placeholder="Супер Дождь из Роз" />
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1.5">Категория</label>
                                    <select id="up-category" class="w-full bg-[#0e1621] border border-border rounded-xl px-4 py-3 text-sm focus:border-[#3da9de] outline-none text-white">
                                        ${CATEGORIES.filter(c => c !== "Все").map(c => `<option value="${c}">${c}</option>`).join('')}
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1.5">Краткое описание</label>
                                <textarea required id="up-desc" class="w-full h-16 bg-[#0e1621] border border-border rounded-xl px-4 py-3 text-sm focus:border-[#3da9de] outline-none resize-none text-white"></textarea>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1.5 flex justify-between">
                                    <span>Полный исходный код (HTML + JS + CSS)</span>
                                </label>
                                <textarea required id="up-code" class="w-full h-80 bg-[#0e1621] border border-border rounded-xl px-4 py-4 text-xs font-mono focus:border-[#3da9de] outline-none resize-y text-emerald-400 leading-relaxed" placeholder="<!DOCTYPE html>\n<html>\n<head>\n  <script src=&quot;https://cdn.socket.io/4.7.2/socket.io.min.js&quot;><\/script>\n</head>\n<body>\n  <!-- Ваш код виджета -->\n</body>\n</html>"></textarea>
                            </div>
                            <button type="submit" ${state.isUploading ? 'disabled' : ''} class="w-full py-4 rounded-xl bg-[#3da9de] text-white font-bold text-sm hover:opacity-90 transition-opacity disabled:opacity-50">
                                ${state.isUploading ? "Публикация..." : "Опубликовать виджет в каталог"}
                            </button>
                        </form>

                        <!-- ДОКУМЕНТАЦИЯ API -->
                        <div class="mt-12 bg-card rounded-3xl border border-border p-6 md:p-8">
                            <h3 class="text-2xl font-bold mb-4 flex items-center gap-3">
                                <i data-lucide="book-open" class="text-[#3da9de]"></i> Полный справочник WebSockets API
                            </h3>
                            <p class="text-slate-400 text-sm mb-6 leading-relaxed">Внутри вашего виджета необходимо подключиться к нашему WebSocket серверу. Имя стримера (<b>user</b>) передается в URL-параметрах. Наш сервер передает <b>сырые данные</b> напрямую от TikTok, так что вам доступны аватарки, бейджики модераторов, цвета никнеймов и многое другое.</p>
                            
                            <h4 class="font-bold text-lg text-white mb-3 mt-8">1. Базовое подключение</h4>
                            <pre class="bg-[#0e1621] p-4 rounded-xl border border-border overflow-x-auto text-xs text-[#3da9de] leading-loose">
<span class="text-slate-500">// 1. В &lt;head&gt; подключите socket.io клиент</span>
&lt;script src="https://cdn.socket.io/4.7.2/socket.io.min.js"&gt;&lt;/script&gt;

<span class="text-slate-500">// 2. В вашем JS коде (получаем username из URL):</span>
const username = new URLSearchParams(window.location.search).get('user');
const socket = io(window.location.origin);

socket.on("connect", () => {
    socket.emit("join_stream", username);
});</pre>

                            <h4 class="font-bold text-lg text-white mb-4 mt-10">2. Доступные события (Слушатели)</h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="bg-[#0e1621] p-4 rounded-xl border border-border hover:border-[#3da9de]/50 transition-colors">
                                    <p class="text-emerald-400 font-mono text-sm mb-1">chat_message</p>
                                    <p class="text-xs text-slate-400">Сообщения чата. Отдает <code>comment</code>, <code>nickname</code>, <code>profilePictureUrl</code>, бейджи юзера и т.д.</p>
                                </div>
                                <div class="bg-[#0e1621] p-4 rounded-xl border border-border hover:border-[#3da9de]/50 transition-colors">
                                    <p class="text-emerald-400 font-mono text-sm mb-1">gift_received</p>
                                    <p class="text-xs text-slate-400">Подарки (уже отфильтрованные от спама комбо). Отдает <code>giftName</code>, <code>giftPictureUrl</code>, <code>diamondCount</code>, <code>repeatCount</code>.</p>
                                </div>
                                <div class="bg-[#0e1621] p-4 rounded-xl border border-border hover:border-[#3da9de]/50 transition-colors">
                                    <p class="text-emerald-400 font-mono text-sm mb-1">like_received</p>
                                    <p class="text-xs text-slate-400">Лайки от зрителей (приходят порциями). Отдает <code>likeCount</code> и <code>totalLikeCount</code>.</p>
                                </div>
                                <div class="bg-[#0e1621] p-4 rounded-xl border border-border hover:border-[#3da9de]/50 transition-colors">
                                    <p class="text-emerald-400 font-mono text-sm mb-1">member_join</p>
                                    <p class="text-xs text-slate-400">Вход зрителя на стрим. Содержит данные профиля зрителя.</p>
                                </div>
                                <div class="bg-[#0e1621] p-4 rounded-xl border border-border hover:border-[#3da9de]/50 transition-colors">
                                    <p class="text-emerald-400 font-mono text-sm mb-1">new_follower & stream_share</p>
                                    <p class="text-xs text-slate-400">События подписки на канал (фоллоу) и репоста трансляции.</p>
                                </div>
                                <div class="bg-[#0e1621] p-4 rounded-xl border border-border hover:border-[#3da9de]/50 transition-colors">
                                    <p class="text-emerald-400 font-mono text-sm mb-1">viewer_count</p>
                                    <p class="text-xs text-slate-400">Регулярное обновление текущего онлайна (отдает <code>viewerCount</code>).</p>
                                </div>
                                <div class="bg-[#0e1621] p-4 rounded-xl border border-border hover:border-[#3da9de]/50 transition-colors">
                                    <p class="text-emerald-400 font-mono text-sm mb-1">new_subscribe</p>
                                    <p class="text-xs text-slate-400">Платная подписка на канал стримера (сабы).</p>
                                </div>
                                <div class="bg-[#0e1621] p-4 rounded-xl border border-border hover:border-[#3da9de]/50 transition-colors">
                                    <p class="text-emerald-400 font-mono text-sm mb-1">treasure_box</p>
                                    <p class="text-xs text-slate-400">Появление сундука с монетами на стриме (содержит данные сундука).</p>
                                </div>
                                <div class="bg-[#0e1621] p-4 rounded-xl border border-border hover:border-[#3da9de]/50 transition-colors">
                                    <p class="text-purple-400 font-mono text-sm mb-1">pk_battle & pk_armies</p>
                                    <p class="text-xs text-slate-400"><b>Эксклюзив!</b> События соревнований (PK Battles). Содержит очки сторон и активных дарителей битвы.</p>
                                </div>
                                <div class="bg-[#0e1621] p-4 rounded-xl border border-border hover:border-[#3da9de]/50 transition-colors">
                                    <p class="text-amber-400 font-mono text-sm mb-1">stream_status</p>
                                    <p class="text-xs text-slate-400">Системный ивент статуса сервера: <code>{ isLive: boolean, roomId: string, error: string }</code></p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.activeNav === 'profile') {
                content = `
                    <div class="max-w-3xl mx-auto py-4 px-4 w-full space-y-8">
                        <div class="bg-card rounded-3xl border border-border p-6 md:p-8 flex flex-col md:flex-row gap-6 md:items-center justify-between">
                            <div class="flex items-center gap-5">
                                <div class="w-20 h-20 rounded-full flex items-center justify-center text-3xl font-bold text-white uppercase bg-gradient-to-r from-blue-500 to-purple-500 shadow-xl">
                                    ${state.tiktokUsername ? state.tiktokUsername.charAt(0) : "S"}
                                </div>
                                <div>
                                    <h2 class="text-xl font-bold">${state.tiktokUsername ? `@${state.tiktokUsername}` : "Настройте аккаунт"}</h2>
                                    <p class="text-sm text-slate-400 mt-1">ID: ${state.userId ? state.userId.slice(0,8) : ''}...</p>
                                </div>
                            </div>
                            <div class="bg-[#0e1621] rounded-2xl p-4 border border-border flex-1 md:max-w-xs">
                                <label class="block text-xs font-medium text-slate-400 uppercase tracking-wide mb-2">Ваш TikTok Username</label>
                                <input id="profile-tiktok" value="${state.tiktokUsername}" placeholder="Например: jake_streamer" class="w-full bg-card border border-border rounded-lg px-3 py-2 text-sm font-medium focus:border-[#3da9de] outline-none text-white" />
                                <p class="text-[10px] text-slate-500 mt-2">Необходим для генерации персональных ссылок для ваших виджетов.</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            main.innerHTML = mobileHeader + content;
        }

        function renderModal() {
            const container = document.getElementById('modal-container');
            if (!state.selectedWidget) {
                container.innerHTML = '';
                return;
            }

            const widget = state.selectedWidget;
            const isInstalled = state.installedIds.has(widget.id);
            const iconName = widget.icon_name ? widget.icon_name.toLowerCase() : 'code';
            const obsUrl = state.tiktokUsername ? `${window.location.origin}/w/${widget.id}?user=${state.tiktokUsername}` : 'Укажите Username в профиле';

            container.innerHTML = `
                <div class="fixed inset-0 bg-black/60 z-40 backdrop-blur-sm" data-close-modal="true"></div>
                <div class="fixed z-50 left-0 right-0 bottom-0 md:bottom-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 w-full md:w-[500px] bg-card md:rounded-3xl rounded-t-3xl border border-border overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                    <div class="md:hidden flex justify-center pt-3 pb-2 bg-card"><div class="w-12 h-1.5 bg-border rounded-full"></div></div>
                    <div class="overflow-y-auto p-5 md:p-6 scrollbar-hide">
                        <div class="flex items-start justify-between mb-5">
                            <div class="flex items-center gap-4">
                                <div class="w-16 h-16 rounded-2xl flex items-center justify-center shadow-lg" style="background: ${widget.gradient}">
                                    <i data-lucide="${iconName}" class="text-white w-7 h-7"></i>
                                </div>
                                <div>
                                    <h2 class="font-bold text-lg leading-tight">${widget.name}</h2>
                                    <p class="text-sm text-slate-400 mt-1">от ${widget.author}</p>
                                </div>
                            </div>
                            <button data-close-modal="true" class="p-2 rounded-full bg-secondary text-slate-400 hover:bg-secondary/80"><i data-lucide="x" class="w-4 h-4"></i></button>
                        </div>
                        <div class="relative h-48 w-full rounded-2xl overflow-hidden mb-5 checker-bg">
                            <div class="absolute inset-0 opacity-20" style="background: ${widget.gradient}"></div>
                            <div class="absolute inset-0 flex flex-col items-center justify-center gap-3">
                                <div class="w-16 h-16 rounded-2xl flex items-center justify-center shadow-2xl transform scale-110" style="background: ${widget.gradient}">
                                    <i data-lucide="${iconName}" class="text-white w-8 h-8"></i>
                                </div>
                                <span class="text-xs text-white/70 font-mono uppercase tracking-widest px-3 py-1 bg-black/40 rounded-full backdrop-blur-md">Прозрачный фон</span>
                            </div>
                        </div>
                        <p class="text-sm text-white/80 leading-relaxed mb-6">${widget.description || 'Оверлей для отображения активности на стриме.'}</p>
                        
                        ${state.userId ? `
                        <div class="bg-[#0e1621] rounded-2xl p-4 border border-border mb-6">
                            <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">Ссылка для Browser Source</h3>
                            <div class="flex gap-2">
                                <code class="text-xs text-slate-400 flex-1 truncate bg-card border border-border px-3 py-2.5 rounded-xl font-mono flex items-center">${obsUrl}</code>
                                <button data-copy="${widget.id}" class="shrink-0 w-10 h-10 rounded-xl bg-[#3da9de] text-white flex items-center justify-center hover:opacity-90">
                                    <i data-lucide="${state.copiedId === widget.id ? 'check' : 'copy'}" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>` : `<div class="bg-[#0e1621]/50 rounded-2xl p-4 border border-border mb-6 text-center"><p class="text-sm text-slate-400">Авторизуйтесь, чтобы получить ссылку</p></div>`}

                        <button data-install-modal="${widget.id}" class="w-full py-4 rounded-xl font-bold text-sm transition-all shadow-lg ${!state.userId ? 'bg-[#3da9de] text-white' : (isInstalled ? 'bg-emerald-500/10 text-emerald-500 border border-emerald-500/20' : 'text-white')}" style="${state.userId && !isInstalled ? `background: ${widget.gradient}` : ''}">
                            ${!state.userId ? "Войти чтобы добавить" : (isInstalled ? "✓ Добавлен в библиотеку" : "Добавить в мои виджеты")}
                        </button>
                    </div>
                </div>
            `;
        }

        // ── EVENT DELEGATION ─────────────────────────────────────────────────
        document.addEventListener('click', async (e) => {
            const navBtn = e.target.closest('[data-nav]');
            if (navBtn) { state.activeNav = navBtn.dataset.nav; renderAll(); return; }

            const catBtn = e.target.closest('[data-category]');
            if (catBtn) { state.activeCategory = catBtn.dataset.category; renderAll(); return; }

            const widgetCard = e.target.closest('[data-widget]');
            const installBtnInCard = e.target.closest('[data-install]');
            if (widgetCard && !installBtnInCard) {
                const id = parseInt(widgetCard.dataset.widget);
                state.selectedWidget = state.widgets.find(w => w.id === id);
                renderAll(); return;
            }

            if (e.target.closest('[data-close-modal]')) {
                state.selectedWidget = null; state.copiedId = null; renderAll(); return;
            }

            const installBtn = e.target.closest('[data-install]') || e.target.closest('[data-install-modal]');
            if (installBtn) {
                if (!state.userId) { state.selectedWidget = null; state.activeNav = "auth"; renderAll(); return; }
                const id = parseInt(installBtn.dataset.install || installBtn.dataset.installModal);
                const isAdding = !state.installedIds.has(id);
                try {
                    if (isAdding) {
                        state.installedIds.add(id);
                        await supabaseFetch('stream_user_installs', { method: 'POST', body: JSON.stringify({ user_id: state.userId, widget_id: id }) });
                    } else {
                        state.installedIds.delete(id);
                        await supabaseFetch(`stream_user_installs?user_id=eq.${state.userId}&widget_id=eq.${id}`, { method: 'DELETE' });
                    }
                    renderAll();
                } catch (err) { console.error(err); }
                return;
            }

            const copyBtn = e.target.closest('[data-copy]');
            if (copyBtn) {
                if (!state.tiktokUsername) {
                    alert("Укажите Username в профиле!");
                    state.selectedWidget = null; state.activeNav = "profile"; renderAll(); return;
                }
                const widget = state.widgets.find(w => w.id === parseInt(copyBtn.dataset.copy));
                const url = `${window.location.origin}/w/${widget.id}?user=${state.tiktokUsername}`;
                navigator.clipboard.writeText(url).then(() => {
                    state.copiedId = widget.id; renderModal(); lucide.createIcons();
                    setTimeout(() => { state.copiedId = null; renderModal(); lucide.createIcons(); }, 2000);
                });
                return;
            }

            const logoutBtn = e.target.closest('[data-action="logout"]');
            if (logoutBtn) handleLogout();

            const toggleAuth = e.target.closest('[data-action="toggle-auth"]');
            if (toggleAuth) { state.isLoginMode = !state.isLoginMode; state.authError = ''; renderAll(); }
        });

        document.addEventListener('input', (e) => {
            if (e.target.id === 'search-input') { state.searchQuery = e.target.value; renderMain(); lucide.createIcons(); }
            if (e.target.id === 'profile-tiktok') {
                state.tiktokUsername = e.target.value; localStorage.setItem('tiktok_username', e.target.value);
            }
        });

        document.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (e.target.id === 'auth-form') {
                const email = document.getElementById('auth-email').value;
                const password = document.getElementById('auth-password').value;
                state.authError = ''; renderMain(); 
                try {
                    const endpoint = state.isLoginMode ? 'token?grant_type=password' : 'signup';
                    const data = await supabaseAuth(endpoint, { email, password });
                    if (data.session || data.access_token) {
                        localStorage.setItem('sb_access_token', data.session?.access_token || data.access_token);
                        localStorage.setItem('sb_user_id', data.user?.id);
                        state.userId = data.user?.id; state.activeNav = "home";
                        await initApp(); 
                    } else if (!state.isLoginMode && data.user) {
                        state.authError = "Регистрация успешна! Теперь вы можете войти."; state.isLoginMode = true;
                    }
                } catch (err) { state.authError = err.message; }
                renderAll();
            }

            if (e.target.id === 'upload-form') {
                if (!state.userId) return;
                state.isUploading = true; renderMain();
                
                const newWidget = {
                    name: document.getElementById('up-name').value,
                    category: document.getElementById('up-category').value,
                    description: document.getElementById('up-desc').value,
                    author: state.tiktokUsername || "Стример", icon_name: "code",
                    gradient: GRADIENTS[Math.floor(Math.random() * GRADIENTS.length)],
                    code_content: document.getElementById('up-code').value, 
                    tags: [], is_new: true
                };

                try {
                    const data = await supabaseFetch('stream_widgets', { method: 'POST', headers: { 'Prefer': 'return=representation' }, body: JSON.stringify(newWidget) });
                    if (data && data.length > 0) { state.widgets.unshift(data[0]); state.activeNav = "home"; }
                } catch (err) { alert("Ошибка при загрузке: " + err.message); }
                
                state.isUploading = false; renderAll();
            }
        });

        function handleLogout() {
            localStorage.removeItem('sb_access_token'); localStorage.removeItem('sb_user_id');
            state.userId = null; state.installedIds = new Set(); state.activeNav = "home"; renderAll();
        }

        initApp();
    </script>
</body>
</html>
